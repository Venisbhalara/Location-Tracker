services:
  - type: web
    name: location-tracker
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: server
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://location-trackers.vercel.app
      - key: ADMIN_URL
        value: https://location-trackers-admin.vercel.app
      - key: ALLOW_ALL_ORIGINS
        value: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://location-tracker-n1p6.onrender.com
      # SUPER_ADMIN_EMAIL and SUPER_ADMIN_PASSWORD: set manually in Render dashboard
